<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f9f8f5; font-family: 'DM Sans', sans-serif; color: #1a1a1a; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    #qc-root { width: 100%; max-width: 560px; }
    .qc-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; color: #1a1a1a; }
    .qc-logo-dot { width: 10px; height: 10px; border-radius: 50%; background: #D85A30; display: inline-block; }
    .screen { display: none; }
    .screen.active { display: block; }
    .hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 34px; line-height: 1.1; letter-spacing: -1px; margin-bottom: 0.5rem; }
    .hero-sub { font-size: 15px; color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
    .topic-btn { background: #fff; border: 0.5px solid #e0ddd6; border-radius: 12px; padding: 10px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; color: #1a1a1a; text-align: left; transition: border-color 0.15s, background 0.15s; }
    .topic-btn:hover { border-color: #bbb; }
    .topic-btn.selected { border: 1.5px solid #D85A30; background: #FAECE7; color: #993C1D; }
    .topic-icon { font-size: 18px; display: block; margin-bottom: 4px; }
    .qc-input { width: 100%; background: #fff; border: 0.5px solid #e0ddd6; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a1a1a; margin-bottom: 1rem; outline: none; }
    .qc-input:focus { border-color: #D85A30; }
    .qc-btn-primary { background: #D85A30; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; width: 100%; }
    .qc-btn-primary:hover { opacity: 0.88; }
    .qc-btn-primary:active { transform: scale(0.98); }
    .qc-btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .qc-btn-ghost { background: transparent; border: 0.5px solid #ccc; border-radius: 8px; padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; color: #1a1a1a; transition: background 0.15s; width: 100%; }
    .qc-btn-ghost:hover { background: #f0ede8; }
    .diff-tabs { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .diff-tab { flex: 1; padding: 8px; border-radius: 8px; border: 0.5px solid #e0ddd6; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; color: #888; text-align: center; transition: all 0.15s; }
    .diff-tab.active { border-color: #D85A30; background: #FAECE7; color: #993C1D; font-weight: 500; }
    .topic-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .topic-row label { font-size: 13px; color: #888; white-space: nowrap; }
    .generating-wrap { text-align: center; padding: 3rem 1rem; }
    .spinner { width: 36px; height: 36px; border: 2.5px solid #e0ddd6; border-top-color: #D85A30; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gen-status { font-size: 14px; color: #888; margin-bottom: 0.5rem; }
    .progress-bar-wrap { background: #e0ddd6; border-radius: 99px; height: 4px; overflow: hidden; margin-top: 1rem; }
    .progress-bar-fill { height: 100%; background: #D85A30; border-radius: 99px; transition: width 0.4s ease; }
    .quiz-progress { display: flex; gap: 4px; margin-bottom: 1rem; }
    .qp-dot { flex: 1; height: 3px; border-radius: 99px; background: #e0ddd6; transition: background 0.3s; }
    .qp-dot.done { background: #D85A30; }
    .qp-dot.current { background: #D85A30; opacity: 0.4; }
    .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .q-counter { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #888; letter-spacing: 0.5px; }
    .timer-badge { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid #e0ddd6; color: #1a1a1a; min-width: 52px; text-align: center; transition: color 0.3s, border-color 0.3s; }
    .timer-badge.urgent { color: #993C1D; border-color: #D85A30; }
    .q-text { font-family: 'Syne', sans-serif; font-size: 19px; font-weight: 700; line-height: 1.35; margin-bottom: 1.25rem; letter-spacing: -0.3px; }
    .options-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .option-btn { background: #fff; border: 0.5px solid #e0ddd6; border-radius: 12px; padding: 12px 14px; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #1a1a1a; transition: border-color 0.15s, background 0.15s; display: flex; align-items: center; gap: 12px; }
    .option-btn:hover:not(:disabled) { border-color: #bbb; }
    .option-btn:disabled { cursor: default; }
    .option-label { width: 24px; height: 24px; border-radius: 6px; background: #f5f4f0; border: 0.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; flex-shrink: 0; color: #888; }
    .option-btn.correct { border: 1.5px solid #1D9E75; background: #E1F5EE; }
    .option-btn.correct .option-label { background: #1D9E75; color: #fff; border-color: #1D9E75; }
    .option-btn.wrong { border: 1.5px solid #E24B4A; background: #FCEBEB; }
    .option-btn.wrong .option-label { background: #E24B4A; color: #fff; border-color: #E24B4A; }
    .feedback-box { border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.5; margin-bottom: 1rem; display: none; }
    .feedback-box.correct { background: #E1F5EE; color: #085041; border: 0.5px solid #5DCAA5; }
    .feedback-box.wrong { background: #FCEBEB; color: #501313; border: 0.5px solid #F09595; }
    .results-header { text-align: center; padding: 0.5rem 0 1.5rem; }
    .score-circle { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #D85A30; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .score-num { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #D85A30; line-height: 1; }
    .score-denom { font-size: 12px; color: #888; }
    .score-label { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 0.25rem; }
    .score-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .results-breakdown { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
    .result-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 8px; background: #f5f4f0; font-size: 13px; }
    .result-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
    .result-icon.c { background: #5DCAA5; color: #04342C; }
    .result-icon.w { background: #F09595; color: #501313; }
    .result-q { font-weight: 500; color: #1a1a1a; line-height: 1.4; }
    .result-answer { color: #888; font-size: 12px; margin-top: 2px; }
    .two-btns { display: flex; gap: 10px; }
    .two-btns .qc-btn-primary, .two-btns .qc-btn-ghost { flex: 1; }
    .error-msg { background: #FCEBEB; color: #501313; border: 0.5px solid #F09595; border-radius: 8px; padding: 12px 14px; font-size: 13px; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
<div id="qc-root">
  <div class="qc-logo"><span class="qc-logo-dot"></span>QuizCraft</div>

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="hero-title">Build your<br>knowledge.</div>
    <p class="hero-sub">Choose a topic or type your own. Claude generates a quiz in seconds.</p>
    <div class="topic-grid">
      <button class="topic-btn" data-topic="World History"><span class="topic-icon">🏛️</span>World History</button>
      <button class="topic-btn" data-topic="Science"><span class="topic-icon">🔬</span>Science</button>
      <button class="topic-btn" data-topic="Geography"><span class="topic-icon">🌍</span>Geography</button>
      <button class="topic-btn" data-topic="Mathematics"><span class="topic-icon">📐</span>Mathematics</button>
      <button class="topic-btn" data-topic="Technology"><span class="topic-icon">💻</span>Technology</button>
      <button class="topic-btn" data-topic="Literature"><span class="topic-icon">📚</span>Literature</button>
    </div>
    <div class="topic-row">
      <label>or enter topic</label>
      <input class="qc-input" id="custom-topic" placeholder="e.g. African history, Quantum physics…" style="margin-bottom:0;flex:1;" />
    </div>
    <div class="diff-tabs">
      <button class="diff-tab active" data-diff="Easy">Easy</button>
      <button class="diff-tab" data-diff="Medium">Medium</button>
      <button class="diff-tab" data-diff="Hard">Hard</button>
    </div>
    <button class="qc-btn-primary" id="start-btn">Generate quiz</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- GENERATING -->
  <div class="screen" id="screen-generating">
    <div class="generating-wrap">
      <div class="spinner"></div>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:0.5rem;" id="gen-topic-label">Generating quiz…</div>
      <div class="gen-status" id="gen-status">Crafting questions…</div>
      <div class="progress-bar-wrap" style="max-width:240px;margin:0.75rem auto 0;"><div class="progress-bar-fill" id="gen-progress" style="width:0%"></div></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-progress" id="quiz-progress"></div>
    <div class="quiz-header">
      <div class="q-counter" id="q-counter">Q 1 / 5</div>
      <div class="timer-badge" id="timer">0:20</div>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="options-list" id="options-list"></div>
    <div class="feedback-box" id="feedback-box"></div>
    <button class="qc-btn-primary" id="next-btn" style="display:none;">Next question</button>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="screen-results">
    <div class="results-header">
      <div class="score-circle"><div class="score-num" id="res-num">0</div><div class="score-denom" id="res-denom">/ 5</div></div>
      <div class="score-label" id="res-label">Great work!</div>
      <div class="score-sub" id="res-sub">Keep practising.</div>
    </div>
    <div class="results-breakdown" id="results-breakdown"></div>
    <div class="two-btns">
      <button class="qc-btn-ghost" id="retry-btn">Retry topic</button>
      <button class="qc-btn-primary" id="new-quiz-btn">New quiz</button>
    </div>
  </div>
</div>

<script>
  const LABELS = ['A','B','C','D'];
  const API_URL = '/api/claude'; // Netlify proxy endpoint

  let state = { topic:'', difficulty:'Easy', questions:[], current:0, score:0, answers:[], timer:null, timeLeft:20 };

  function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }

  document.querySelectorAll('.topic-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      document.getElementById('custom-topic').value = btn.dataset.topic;
    });
  });

  document.querySelectorAll('.diff-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.diff-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      state.difficulty = tab.dataset.diff;
    });
  });

  document.getElementById('start-btn').addEventListener('click', () => {
    const custom = document.getElementById('custom-topic').value.trim();
    const selected = document.querySelector('.topic-btn.selected');
    state.topic = custom || (selected ? selected.dataset.topic : '');
    if (!state.topic) {
      document.getElementById('custom-topic').style.borderColor = '#D85A30';
      document.getElementById('custom-topic').placeholder = 'Please enter a topic first…';
      return;
    }
    startGeneration();
  });

  async function startGeneration() {
    show('generating');
    document.getElementById('gen-topic-label').textContent = state.topic;
    const statuses = ['Crafting questions…','Adding tricky options…','Checking answers…','Almost ready…'];
    let si = 0;
    const progEl = document.getElementById('gen-progress');
    const statusEl = document.getElementById('gen-status');
    const prog = setInterval(() => { si++; if(si<statuses.length) statusEl.textContent=statuses[si]; progEl.style.width=Math.min(si*28,88)+'%'; }, 700);

    try {
      const prompt = `Generate a ${state.difficulty} difficulty quiz about "${state.topic}" with exactly 5 multiple choice questions. Return ONLY a JSON array (no markdown, no explanation) with this structure: [{"q":"question text","options":["A text","B text","C text","D text"],"answer":0,"explanation":"brief explanation"}] answer is the 0-based index of the correct option.`;
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
      });
      const data = await res.json();
      clearInterval(prog); progEl.style.width='100%';
      if (data.error) throw new Error(data.error.message || data.error);
      const raw = data.content.map(i=>i.text||'').join('');
      const clean = raw.replace(/```json|```/g,'').trim();
      state.questions = JSON.parse(clean);
      state.current=0; state.score=0; state.answers=[];
      setTimeout(()=>startQuiz(), 300);
    } catch(e) {
      clearInterval(prog);
      show('home');
      const errEl = document.getElementById('error-msg');
      errEl.textContent = 'Error: ' + e.message + '. Check your ANTHROPIC_API_KEY in Netlify environment variables.';
      errEl.style.display = 'block';
    }
  }

  function buildProgressDots() {
    const el=document.getElementById('quiz-progress'); el.innerHTML='';
    state.questions.forEach((_,i)=>{ const d=document.createElement('div'); d.className='qp-dot'+(i<state.current?' done':i===state.current?' current':''); el.appendChild(d); });
  }

  function startQuiz() { show('quiz'); renderQuestion(); }

  function renderQuestion() {
    const q=state.questions[state.current];
    buildProgressDots();
    document.getElementById('q-counter').textContent='Q '+(state.current+1)+' / '+state.questions.length;
    document.getElementById('q-text').textContent=q.q;
    const ol=document.getElementById('options-list'); ol.innerHTML='';
    q.options.forEach((opt,i)=>{ const btn=document.createElement('button'); btn.className='option-btn'; btn.innerHTML=`<span class="option-label">${LABELS[i]}</span><span>${opt}</span>`; btn.addEventListener('click',()=>selectAnswer(i)); ol.appendChild(btn); });
    const fb=document.getElementById('feedback-box'); fb.style.display='none'; fb.className='feedback-box';
    document.getElementById('next-btn').style.display='none';
    startTimer();
  }

  function startTimer() {
    clearInterval(state.timer);
    state.timeLeft = state.difficulty==='Easy'?20:state.difficulty==='Medium'?15:10;
    updateTimerDisplay();
    state.timer=setInterval(()=>{ state.timeLeft--; updateTimerDisplay(); if(state.timeLeft<=0){clearInterval(state.timer);timeUp();} },1000);
  }

  function updateTimerDisplay() {
    const el=document.getElementById('timer');
    el.textContent='0:'+String(state.timeLeft).padStart(2,'0');
    el.className='timer-badge'+(state.timeLeft<=5?' urgent':'');
  }

  function timeUp() { disableOptions(); const q=state.questions[state.current]; markCorrect(q.answer); showFeedback(false,'Time up! '+q.explanation); state.answers.push({selected:-1,correct:q.answer}); document.getElementById('next-btn').style.display='block'; }

  function selectAnswer(idx) {
    clearInterval(state.timer); disableOptions();
    const q=state.questions[state.current]; const correct=idx===q.answer;
    const btns=document.querySelectorAll('.option-btn');
    btns[idx].classList.add(correct?'correct':'wrong');
    if(!correct)markCorrect(q.answer);
    if(correct)state.score++;
    state.answers.push({selected:idx,correct:q.answer});
    showFeedback(correct,q.explanation);
    document.getElementById('next-btn').style.display='block';
  }

  function disableOptions() { document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true); }
  function markCorrect(idx) { document.querySelectorAll('.option-btn')[idx].classList.add('correct'); }

  function showFeedback(correct,explanation) {
    const fb=document.getElementById('feedback-box');
    fb.className='feedback-box '+(correct?'correct':'wrong');
    fb.textContent=(correct?'Correct! ':'Not quite. ')+explanation;
    fb.style.display='block';
  }

  document.getElementById('next-btn').addEventListener('click',()=>{ state.current++; if(state.current>=state.questions.length)showResults(); else renderQuestion(); });

  function showResults() {
    clearInterval(state.timer); show('results');
    const n=state.questions.length, s=state.score;
    document.getElementById('res-num').textContent=s;
    document.getElementById('res-denom').textContent='/ '+n;
    const labels=['Keep practising!','Good effort!','Nice work!','Great work!','Outstanding!'];
    const subs=['Review the topics and try again.','You\'re getting there.','Solid performance.','You\'re doing really well.','You nailed every question!'];
    const idx=Math.min(Math.floor((s/n)*5),4);
    document.getElementById('res-label').textContent=labels[idx];
    document.getElementById('res-sub').textContent=subs[idx];
    const bd=document.getElementById('results-breakdown'); bd.innerHTML='';
    state.questions.forEach((q,i)=>{
      const ans=state.answers[i]; const correct=ans.selected===ans.correct;
      const row=document.createElement('div'); row.className='result-row';
      const yourAns=ans.selected===-1?'Time up':q.options[ans.selected];
      const correctAns=q.options[ans.correct];
      row.innerHTML=`<div class="result-icon ${correct?'c':'w'}">${correct?'✓':'✗'}</div><div><div class="result-q">${q.q}</div><div class="result-answer">${correct?'Correct: '+correctAns:'You: '+yourAns+' · Correct: '+correctAns}</div></div>`;
      bd.appendChild(row);
    });
  }

  document.getElementById('retry-btn').addEventListener('click',()=>{ state.current=0; state.score=0; state.answers=[]; startGeneration(); });
  document.getElementById('new-quiz-btn').addEventListener('click',()=>{ document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('selected')); document.getElementById('custom-topic').value=''; show('home'); });
</script>
</body>
</html>
