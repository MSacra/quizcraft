[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/anthropic"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/anthropic-proxy"
  status = 200

[[redirects]]
  from = "/api/quiz-submit"
